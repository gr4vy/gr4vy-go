name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}
  schedule:
    # “At 08:30 on every day-of-week from Monday through Friday.”
    - cron: 30 8 * * 1-5

jobs:
  # Format + build check for the test suite and tooling. We deliberately do not
  # `go vet ./...` the whole module: the generated SDK trips vet's
  # unreachable-code check, which is upstream's concern, not this PR's.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Go 1.24
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l test scripts)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet test suite and tooling
        run: go vet ./test/... ./scripts/...

  # E2E suites, sharded by directory so wall-clock stays low. Each shard runs in
  # its own process and provisions exactly one merchant account, so shards are
  # fully independent. The shard map lives here; `go test` runs just that package.
  e2e:
    name: e2e (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - { shard: flows, path: ./test/flows/ }
          - { shard: processing, path: ./test/processing/ }
          - { shard: backoffice, path: ./test/backoffice/ }

    steps:
      - name: Check out the repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Go 1.24
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"

      - name: Run ${{ matrix.shard }} suite
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          # Fork PRs don't get repository secrets, so skip the live suite there.
          # On trusted refs (same-repo PRs / main) a missing key is a real problem —
          # fail loudly rather than letting ci-complete go green without coverage.
          if [ -z "$PRIVATE_KEY" ]; then
            if [ "$IS_FORK_PR" = "true" ]; then
              echo "Fork PR without secrets — skipping live E2E suite."
              exit 0
            fi
            echo "::error::PRIVATE_KEY is not set on a trusted ref — failing instead of silently skipping the live suite."
            exit 1
          fi
          go test -count=1 ${{ matrix.path }}

  # Offline tests (JWT + webhook signing + generated unit tests) across the
  # supported Go versions — fast cross-version sanity that needs no sandbox.
  offline:
    name: offline (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        go:
          - "1.22"
          - "1.23"
          - "1.24"

    steps:
      - name: Check out the repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Go ${{ matrix.go }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go }}

      - name: Run offline suite
        run: go test -count=1 . ./optionalnullable/... ./internal/...

  # Single stable required check. Branch rulesets should require THIS context
  # (not the per-shard matrix jobs, whose names change when shards are added).
  ci-complete:
    name: ci-complete
    needs: [lint, e2e, offline]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: All suites passed
        run: echo "Lint, all E2E shards and offline suites passed."

      - name: Auto-approve SDK-regen PRs
        uses: hmarr/auto-approve-action@8f929096a962e83ccdfa8afcf855f39f12d4dac7 # v4
        if: "github.event.pull_request.user.login == 'github-actions[bot]'"
        with:
          github-token: ${{ secrets.DISPATCH_ACCESS_TOKEN }}

  # Endpoint-reach report posted as a sticky PR comment. NOT a merge dependency
  # (it must never block auto-merge). Same-repo PRs only (needs the secret).
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Go 1.24
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"

      - name: Run full suite with HTTP tracking
        continue-on-error: true
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          GR4VY_TRACK_HTTP: "1"
          # One shared, absolute directory so every shard's recorder writes to
          # the same place (each `go test` package runs in its own CWD).
          GR4VY_COVERAGE_DIR: ${{ github.workspace }}/coverage/http
        run: go test -count=1 ./test/...

      - name: Build endpoint-coverage report
        run: go run ./scripts/endpoint_coverage .

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: endpoint-coverage
          path: coverage/endpoint-coverage.md

  merge:
    needs: ci-complete
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - id: automerge
        name: automerge
        if: "github.event.pull_request.user.login == 'github-actions[bot]'"
        uses: "pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67" # v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.DISPATCH_ACCESS_TOKEN }}
          MERGE_LABELS: ''
          MERGE_REQUIRED_APPROVALS: 0
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: "pull-request-title"
          MERGE_ERROR_FAIL: true
          MERGE_DELETE_BRANCH: true
          MERGE_FORKS: false
          UPDATE_METHOD: rebase

  notify:
    needs: [lint, e2e, offline]
    runs-on: ubuntu-latest
    if: ${{ contains(needs.*.result, 'failure') }}
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'github-actions[bot]')
        env:
            SLACK_USERNAME: Go SDK
            SLACK_TITLE: Go SDK
            SLACK_WEBHOOK: ${{ secrets.SLACK_SDK_WEBHOOK_URL }}
            SLACK_CHANNEL: sdk-updates
            SLACK_MSG_AUTHOR: gr4vy-code
            SLACK_ICON_EMOJI: ":gr4vy:"
            SLACK_COLOR: "${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}"
            SLACK_MESSAGE_ON_SUCCESS: "CI passed"
            SLACK_MESSAGE_ON_FAILURE: "CI failed"
            SLACK_FOOTER: ""
